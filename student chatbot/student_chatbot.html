    <script>
        // Lucide Icon Init
        lucide.createIcons();

        // Toast System
        window.showToast = (title, message, type = 'success') => {
            const container = document.getElementById('toaster-container');
            const color = type === 'success' ? 'bg-green-500' : 'bg-red-600';
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-lg shadow-xl text-white ${color} transition-all duration-300`;
            toast.innerHTML = `<strong>${title}</strong><p class="text-sm">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        };

        // Generic Submit Handler
        async function handleFormSubmit(event, url, successTitle) {
            event.preventDefault();
            const form = event.target;
            const btn = form.querySelector('button');
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = 'Processing...';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(new FormData(form)).toString()
                });
                const result = await response.json();
                if (result.success) {
                    window.showToast(successTitle, result.message);
                    form.reset();
                } else {
                    window.showToast('Error', result.message, 'error');
                }
            } catch (e) {
                window.showToast('Error', 'Connection failed', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        window.submitFullConcern = (e) => handleFormSubmit(e, 'submit_detailed_concern.php', 'Report Sent');
        window.bookAppointment = (e) => handleFormSubmit(e, 'book_appointment.php', 'Booking Confirmed');
    </script>
